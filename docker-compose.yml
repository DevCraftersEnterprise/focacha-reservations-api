services:
  postgres:
    image: postgres:16
    container_name: restaurant_reservations_db
    restart: always
    environment:
      POSTGRES_DB: restaurant_reservations
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: